name: Netlify deploy

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NETLIFY_SITE_ID: abb8e96e-1e7d-4e1a-bd41-fa0dd6190495

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Build site
        run: npm run build
        env:
          CI: true

      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "NETLIFY_AUTH_TOKEN is missing. Add it in GitHub repository Settings > Secrets and variables > Actions."
            exit 1
          fi
          (cd out && zip -qr ../site.zip .)
          HTTP_CODE="$(curl -sS -o netlify-response.json -w "%{http_code}" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @site.zip \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys")"
          RESPONSE="$(tr '\n' ' ' < netlify-response.json | cut -c1-800)"
          echo "::notice title=Netlify response code::$HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "::error title=Netlify deploy failed::HTTP $HTTP_CODE $RESPONSE"
            exit 1
          fi
          echo "$RESPONSE"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy branch preview
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Branch previews are disabled for direct API deploys."
