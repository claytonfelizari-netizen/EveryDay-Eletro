name: Netlify deploy

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NETLIFY_SITE_ID: abb8e96e-1e7d-4e1a-bd41-fa0dd6190495

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Netlify token
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "NETLIFY_AUTH_TOKEN is missing. Add it in GitHub repository Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Prepare public files
        run: |
          mkdir -p _site
          cp index.html logo.png banner-eletronicos.png produtos.json produto*.jpg produto*.txt _site/
          cp -R config _site/

      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        run: |
          (cd _site && zip -qr ../site.zip .)
          HTTP_CODE="$(curl -sS -o netlify-response.json -w "%{http_code}" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @site.zip \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys")"
          cat netlify-response.json
          test "$HTTP_CODE" = "200" -o "$HTTP_CODE" = "201" -o "$HTTP_CODE" = "202"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy branch preview
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Branch previews are disabled for direct API deploys."
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
