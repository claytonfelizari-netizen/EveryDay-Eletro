name: Netlify deploy

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NETLIFY_SITE_ID: abb8e96e-1e7d-4e1a-bd41-fa0dd6190495

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Check Netlify token
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "NETLIFY_AUTH_TOKEN is missing. Add it in GitHub repository Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Prepare public files
        run: |
          test -f out/index.html

      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        run: |
          npx --yes netlify-cli@latest deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir "out" \
            --prod \
            --message "Production deploy $GITHUB_SHA"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy branch preview
        if: github.ref != 'refs/heads/main'
        run: |
          BRANCH_ALIAS="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g' | cut -c1-37)"
          npx --yes netlify-cli@latest deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir "out" \
            --alias "$BRANCH_ALIAS" \
            --message "Branch deploy ${GITHUB_REF_NAME} $GITHUB_SHA"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
